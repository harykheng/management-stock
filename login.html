<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - UD.DIANA</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 12px;
    }
    .login-logo h1 { font-size: 22px; font-weight: 700; color: #0f172a; }
    .login-logo p { font-size: 13px; color: #64748b; margin-top: 4px; }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      color: #1e293b;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    .form-group input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      margin-top: 4px;
    }
    .btn-login:hover { opacity: .9; }
    .btn-login:active { transform: scale(.99); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }
    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">📦</div>
      <h1>UD.DIANA</h1>
      <p>Sistem Manajemen Stok</p>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="email@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="btn-login" onclick="doLogin()">Masuk</button>

    <div class="login-footer">© 2025 UD.DIANA · StokManager</div>
  </div>

<script src="js/config.js"></script>
<script>
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btn-login');
    const errEl = document.getElementById('error-msg');

    errEl.style.display = 'none';
    if (!email || !password) {
      showError('Email dan password wajib diisi');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Masuk...';

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      btn.disabled = false;
      btn.textContent = 'Masuk';
      showError('Email atau password salah');
      return;
    }

    const { data: profile } = await supabase.from('user_profiles').select('role,is_active').eq('id', data.user.id).single();

    if (!profile || !profile.is_active) {
      await supabase.auth.signOut();
      btn.disabled = false;
      btn.textContent = 'Masuk';
      showError('Akun tidak aktif. Hubungi admin.');
      return;
    }

    window.location.href = profile.role === 'admin' ? 'index.html' : 'sales.html';
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  // redirect if already logged in
  (async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      const { data: profile } = await supabase.from('user_profiles').select('role').eq('id', session.user.id).single();
      if (profile) window.location.href = profile.role === 'admin' ? 'index.html' : 'sales.html';
    }
  })();
</script>
</body>
</html>
